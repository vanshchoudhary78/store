<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
</head>

<body>
<div class="sidebar">
<h2>Pharmacy</h2>
<a href="index.html">Dashboard</a>
<a href="inventory.html">Inventory</a>
<a href="billing.html">Billing</a>
</div>

<div class="main">

<h1>Add Medicine</h1>

<div class="form-group">
<input id="name" placeholder="Medicine Name">
<input id="company" placeholder="Company">
<input id="price" placeholder="Price">
<input id="qty" placeholder="Quantity">
<button onclick="addMedicine()">Add Medicine</button>
</div>

<h2>Scan Bill Image</h2>
<input type="file" id="billImage" accept="image/*">
<button onclick="scanBill()">Scan Bill</button>
<p id="scanStatus"></p>

<h2>Scanned Medicines</h2>
<table id="scanTable">
<thead>
<tr>
<th>Name</th>
<th>Qty</th>
<th>Price</th>
</tr>
</thead>
<tbody></tbody>
</table>
<button onclick="saveScannedMedicines()">Save Medicines</button>

<h2>Search</h2>
<div class="searchBox">
<input id="search" placeholder="Search Medicine" onkeyup="searchMedicine()">
</div>

<h2>Medicine List</h2>
<table id="medicineTable">
<thead>
<tr>
<th>Name</th>
<th>Company</th>
<th>Price</th>
<th>Qty</th>
<th>Action</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<script src="script.js"></script>

</body>
</html>
